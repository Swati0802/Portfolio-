<html>
    <head>
        <style>
            div{
                width: 150px;
                height: 150px;
                animation-duration: 4s;
                animation-delay: 2s;
                animation-direction: normal;
                background-color: rgb(195, 41, 67);
                animation-name: Animation;
                margin: 50px;
            }
            div:hover{
                background-color: darkmagenta;
            }
            @keyframes Animation{
                0%{background-color: rgb(202, 66, 88);}
                25%{background-color: rgb(238, 114, 134);}
                75%{background-color: pink;}
                100%{background-color: mistyrose;}
            }
        </style>
    </head>
    <body>
        <h2>CSS Animation</h2>
       <div></div> 
    </body>
</html>
