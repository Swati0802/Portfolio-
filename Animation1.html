<html>
    <head>
        <style>
            div{
                width: 150px;
                height: 150px;
                animation-duration: 4s;
                animation-delay: 2s;
                animation-direction: normal;
                background-color: rgb(6, 6, 63);
                animation-name: Animation;
                margin: 50px;
            }
            @keyframes Animation{
                from{background-color:rgb(39, 39, 132);}
                to{background-color: rgb(122, 122, 175);}

            }
        </style>
    </head>
    <body>
        <h2>CSS Animation</h2>
       <div></div> 
    </body>
</html>
